name: CI — Test + Deploy

# Triggers: run on every push to any branch
# On 'main' branch: also deploy to Railway after tests pass
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # ===========================================================================
  # Job 1: Run tests + type check
  # ===========================================================================
  test:
    name: pytest + mypy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install uv (modern Python package manager)
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      # Install all dependencies (including dev: pytest, mypy)
      - name: Install dependencies
        run: uv sync --extra dev

      # Run pytest — if any test fails, this step fails and deploy is skipped
      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
        env:
          # Provide dummy env vars so imports don't fail during testing
          GEMINI_API_KEY: "test-key"
          GROQ_API_KEY: "test-key"
          DATABASE_URL: "postgresql+asyncpg://test:test@localhost/test"
          QDRANT_URL: "http://localhost:6333"
          LANGFUSE_PUBLIC_KEY: ""
          LANGFUSE_SECRET_KEY: ""

      # Run mypy type checker — flags type errors without running the code
      - name: Type check with mypy
        run: uv run mypy backend/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # Don't fail CI on type errors (warnings only for now)

  # ===========================================================================
  # Job 2: Deploy to Railway (only on main branch, only if tests pass)
  # ===========================================================================
  deploy:
    name: Deploy to Railway
    needs: test          # only runs if the 'test' job succeeded
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Railway CLI and deploy
      # RAILWAY_TOKEN is stored in GitHub repository secrets
      - name: Deploy to Railway
        uses: bervProject/railway-deploy@main
        with:
          railway_token: ${{ secrets.RAILWAY_TOKEN }}
          service: "agentic-rag-app"
