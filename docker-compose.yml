
# This file starts all services with one command: docker compose up
# Services: FastAPI app, PostgreSQL, Qdrant, Langfuse (optional)

services:

  # -------------------------------------------------------------------------
  # FastAPI application — the main backend
  # -------------------------------------------------------------------------
  app:
    build: .
    container_name: rag_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://raguser:ragpassword@postgres:5432/ragdb
      - QDRANT_URL=http://qdrant:6333
      - APP_ENV=production
      - LANGFUSE_HOST=http://langfuse:3000
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: on-failure
    volumes:
      - ./uploads:/app/uploads

  # -------------------------------------------------------------------------
  # PostgreSQL — stores collections, documents, sessions, messages, eval scores
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Qdrant — vector database for storing and searching document embeddings
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"   # REST API port
      - "6334:6334"   # gRPC port (optional)
    environment:
      - QDRANT__TELEMETRY_DISABLED=true
    volumes:
      - qdrant_data:/qdrant/storage

  # -------------------------------------------------------------------------
  # Langfuse — self-hosted observability dashboard (optional)
  # If you prefer Langfuse Cloud, comment out this entire service block
  # and set LANGFUSE_HOST=https://cloud.langfuse.com in your .env
  # -------------------------------------------------------------------------
  langfuse:
    image: langfuse/langfuse:2
    container_name: rag_langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://raguser:ragpassword@postgres:5432/ragdb
      - NEXTAUTH_SECRET=a_very_long_random_secret_change_this
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=this_is_a_very_secure_random_salt_for_langfuse_api_keys_encryption
      - TELEMETRY_ENABLED=false
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

# -------------------------------------------------------------------------
# Named volumes — Docker manages these, data persists across restarts
# -------------------------------------------------------------------------
volumes:
  postgres_data:
  qdrant_data:
